<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事リーダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5efe6; --surface: #ede3d6; --border: #cbbfa8; --accent: #8b5e3c;
    --accent2: #5a7fa8; --text: #000000; --text-sub: #4a3f35; --radius: 12px;
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Zen Kaku Gothic New',sans-serif; min-height:100vh; padding-bottom:80px; }
  header { padding:28px 24px 20px; background:#1a2a4a; display:flex; align-items:baseline; gap:12px; color:#f5d020; }
  header h1 { font-family:'Noto Serif JP',serif; font-weight:300; font-size:1.35rem; letter-spacing:.12em; }
  main { padding:24px 20px; max-width:680px; margin:0 auto; }
  .url-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:20px; }
  .url-row { display:flex; gap:10px; }
  #urlInput { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:8px; }
  #fetchBtn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:10px 18px; cursor:pointer; font-weight:700; }
  #status { font-size:.78rem; min-height:20px; margin-bottom:16px; padding-left:4px; }
  #status.error { color:#e07070; }
  #status.ok { color:#7ecb9a; }
  #articleCard { display:none; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  #articleText { padding:18px 20px; line-height:1.9; max-height:320px; overflow-y:auto; }
  .highlight { background:rgba(139,94,60,.18); }
  /* 省略（他のスタイルは前回と同じでOK） */
</style>
</head>
<body>

<header>
  <h1>記事リーダー</h1>
  <span>ARTICLE READER</span>
  <span id="releaseInfo">v2.2 Amebaプロフィール完全対応 &nbsp;|&nbsp; 2026-05</span>
</header>

<main>
  <div class="url-block">
    <label>▸ 読み上げる記事のURLを入力</label>
    <div class="url-row">
      <input id="urlInput" type="url" placeholder="https://..." value="https://www.ameba.jp/profile/general/happy-ronan/">
      <button id="fetchBtn" onclick="fetchArticle()">取得</button>
    </div>
    <div class="maxchars-row">
      <span>読み上げ文字数上限</span>
      <select id="maxChars">
        <option value="1000">1000字</option>
        <option value="2000" selected>2000字</option>
        <option value="4000">4000字</option>
        <option value="0">全文</option>
      </select>
    </div>
  </div>

  <div id="status">URLを入力して「取得」を押してください</div>
  <div id="langBadge" style="display:none; margin-bottom:12px; padding-left:4px;"></div>

  <div id="articleCard">
    <div class="card-header">
      <div id="articleTitle"></div>
      <div id="articleMeta"></div>
    </div>
    <div id="articleText"></div>
    <div class="player"> <!-- 前回と同じプレーヤー部分をここに貼り付けてください（省略） --></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/readability/0.6.0/Readability.js"></script>

<script>
// PROXY_LIST（前回と同じ）
const PROXY_LIST = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
  url => `https://proxy.cors.sh/${url}`,
];

let sentences = [], currentIdx = 0, isPlaying = false, rate = 1.0, selectedVoice = null, currentLang = 'ja';

// （detectLang, loadVoices, onVoiceChange, splitToSentences, 再生関連関数は前回版と同じなので省略）
// 必要なら前回のコードからコピーしてください

async function fetchArticle() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url.startsWith('http')) return setStatus('有効なURLを入力してください', 'error');

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.textContent = '取得中...';
  setStatus('取得中…');

  let html = null;
  for (let p of PROXY_LIST) {
    try {
      const res = await fetch(p(url), {signal: AbortSignal.timeout(15000)});
      if (res.ok) {
        html = await res.text();
        if (html.length > 1000) break;
      }
    } catch(e){}
  }

  btn.disabled = false; btn.textContent = '取得';

  if (!html) return setStatus('取得失敗しました', 'error');

  const {title, text} = extractArticleAmeba(html, url);
  
  if (text.length < 100) {
    return setStatus('本文が抽出できませんでした。別の記事ページを試してください。', 'error');
  }

  showArticle(title, text, url);
}

// ==================== Amebaプロフィール特化抽出 ====================
function extractArticleAmeba(html, url) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  let title = doc.title || 'ろんろんさんのプロフィール';

  let text = '';

  // 1. Readabilityを試す
  try {
    const reader = new Readability(doc);
    const article = reader.parse();
    if (article?.textContent?.length > 300) text = article.textContent;
  } catch(e) {}

  // 2. Amebaプロフィール特化抽出（これが以前のバージョンで効いていた部分）
  if (text.length < 300) {
    // 自己紹介部分を強く狙う
    const profileSelectors = ['.profile', 'section', 'article', 'div'];
    for (let sel of profileSelectors) {
      const els = doc.querySelectorAll(sel);
      for (let el of els) {
        const t = el.textContent.trim();
        if (t.length > 200 && /自己紹介|プロフィール|インストラクター|石垣浩子/.test(t)) {
          text = t;
          break;
        }
      }
      if (text.length > 200) break;
    }

    // 3. 最終フォールバック（全テキストを集める）
    if (text.length < 200) {
      text = [...doc.querySelectorAll('p, div, section')]
        .map(el => el.textContent.trim())
        .filter(t => t.length > 30)
        .join('\n\n');
    }
  }

  text = text
    .replace(/https?:\/\/\S+/g, '')
    .replace(/[ \t]+/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();

  return { title, text };
}

// showArticle, splitToSentences などは前回版と同じものを使用
// （ここに前回の showArticle, splitToSentences, highlightSentence などの関数を貼り付けてください）

</script>
</body>
</html>
