<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記事リーダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5efe6;
    --surface:   #ede3d6;
    --border:    #cbbfa8;
    --accent:    #8b5e3c;
    --accent2:   #5a7fa8;
    --text:      #000000;
    --text-sub:  #4a3f35;
    --radius:    12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
    overflow-x: hidden;
  }

  /* ---- header ---- */
  header {
    padding: 28px 24px 20px;
    background: #1a2a4a;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 1.35rem;
    letter-spacing: .12em;
    color: #f5d020;
  }
  header span {
    font-size: .7rem;
    color: #a8b8d0;
    letter-spacing: .08em;
  }

  /* ---- main ---- */
  main { padding: 24px 20px; max-width: 680px; margin: 0 auto; }

  /* ---- URL入力エリア ---- */
  .url-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
  }
  .url-block label {
    display: block;
    font-size: .72rem;
    letter-spacing: .1em;
    color: var(--text-sub);
    margin-bottom: 10px;
  }
  .url-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  #urlInput {
    flex: 1;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: .88rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
  }
  #urlInput:focus { border-color: var(--accent2); }
  #urlInput::placeholder { color: var(--text-sub); }

  #fetchBtn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 700;
    font-size: .82rem;
    padding: 10px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s, transform .1s;
  }
  #fetchBtn:active { transform: scale(.96); opacity: .85; }
  #fetchBtn:disabled { opacity: .4; cursor: default; }

  /* ---- status ---- */
  #status {
    font-size: .78rem;
    color: var(--text-sub);
    min-height: 20px;
    margin-bottom: 16px;
    padding-left: 4px;
    transition: color .3s;
  }
  #status.error { color: #e07070; }
  #status.ok    { color: #7ecb9a; }

  /* ---- article card ---- */
  #articleCard {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  #articleTitle {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.6;
    color: var(--accent);
    margin-bottom: 6px;
  }
  #articleMeta {
    font-size: .7rem;
    color: var(--text-sub);
    letter-spacing: .05em;
  }

  #articleText {
    padding: 18px 20px;
    font-size: .88rem;
    line-height: 1.9;
    color: var(--text);
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #articleText::-webkit-scrollbar { width: 4px; }
  #articleText::-webkit-scrollbar-track { background: transparent; }
  #articleText::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ---- player ---- */
  .player {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* 再生バー */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #progressBar {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  #progressBar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  #timeDisplay {
    font-size: .7rem;
    color: var(--text-sub);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* ボタン行 */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: .82rem;
    padding: 9px 16px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .ctrl-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .ctrl-btn:active { transform: scale(.95); }
  .ctrl-btn:disabled { opacity: .35; cursor: default; }

  #playPauseBtn {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
    font-weight: 700;
    padding: 9px 22px;
  }
  #playPauseBtn:hover { opacity: .85; }

  /* 速度・文字数 */
  .settings-row {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .setting-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .76rem;
    color: var(--text-sub);
  }
  .setting-item select,
  .setting-item input[type=range] {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: .76rem;
    padding: 4px 8px;
    outline: none;
  }
  .setting-item input[type=range] {
    width: 80px;
    padding: 0 4px;
    cursor: pointer;
  }
  #rateVal { min-width: 28px; }

  /* ハイライト */
  .highlight {
    background: rgba(139,94,60,.18);
    border-radius: 3px;
    transition: background .2s;
  }

  /* ---- 読み上げ中インジケーター ---- */
  .wave {
    display: none;
    align-items: center;
    gap: 3px;
    margin-left: auto;
  }
  .wave.active { display: flex; }
  .wave span {
    display: block;
    width: 3px;
    height: 12px;
    background: var(--accent2);
    border-radius: 3px;
    animation: wave 1s ease-in-out infinite;
  }
  .wave span:nth-child(2) { animation-delay: .15s; }
  .wave span:nth-child(3) { animation-delay: .30s; }
  .wave span:nth-child(4) { animation-delay: .45s; }
  @keyframes wave {
    0%,100% { transform: scaleY(.4); }
    50%      { transform: scaleY(1.2); }
  }
</style>
</head>
<body>

<header>
  <h1>記事リーダー</h1>
  <span>ARTICLE READER</span>
</header>

<main>
  <!-- URL入力 -->
  <div class="url-block">
    <label>▸ 読み上げる記事のURLを入力</label>
    <div class="url-row">
      <input id="urlInput" type="url" placeholder="https://..." autocomplete="off" inputmode="url">
      <button id="fetchBtn" onclick="fetchArticle()">取得</button>
    </div>
  </div>

  <div id="status">URLを入力して「取得」を押してください</div>
  <div id="langBadge" style="display:none; margin-bottom:12px; padding-left:4px;"></div>

  <!-- 記事カード -->
  <div id="articleCard">
    <div class="card-header">
      <div id="articleTitle"></div>
      <div id="articleMeta"></div>
    </div>
    <div id="articleText"></div>

    <!-- プレーヤー -->
    <div class="player">
      <!-- 進捗バー -->
      <div class="progress-wrap">
        <input id="progressBar" type="range" min="0" max="100" value="0"
               oninput="onProgressInput(this.value)">
        <span id="timeDisplay">0 / 0 文</span>
      </div>

      <!-- コントロール -->
      <div class="controls">
        <button class="ctrl-btn" onclick="skipSentences(-3)">◀◀ 3文</button>
        <button id="playPauseBtn" class="ctrl-btn" onclick="togglePlay()">▶ 再生</button>
        <button class="ctrl-btn" onclick="skipSentences(3)">3文 ▶▶</button>
        <button class="ctrl-btn" onclick="stopReading()">■ 停止</button>
        <div class="wave" id="wave">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <!-- 設定 -->
      <div class="settings-row">
        <div class="setting-item">
          速度
          <input type="range" min="0.5" max="2.0" step="0.1" value="1.0"
                 oninput="onRateChange(this.value)">
          <span id="rateVal">1.0</span>
        </div>
        <div class="setting-item">
          声
          <select id="voiceSelect" onchange="onVoiceChange()"></select>
        </div>
        <div class="setting-item">
          文字数上限
          <select id="maxChars">
            <option value="500">500字</option>
            <option value="1000" selected>1000字</option>
            <option value="2000">2000字</option>
            <option value="0">全文</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// =============================================
//  定数・状態
// =============================================
const PROXY_LIST = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];

let sentences    = [];
let currentIdx   = 0;
let isPlaying    = false;
let utterance    = null;
let rate         = 1.0;
let selectedVoice = null;
let currentLang  = 'ja';   // 検出言語

// =============================================
//  言語判定
// =============================================
function detectLang(text) {
  const jpChars = (text.match(/[\u3040-\u30ff\u4e00-\u9fff]/g) || []).length;
  return jpChars > text.length * 0.05 ? 'ja' : 'en';
}

// =============================================
//  音声リスト初期化（日英両対応）
// =============================================
function loadVoices(lang) {
  const sel = document.getElementById('voiceSelect');
  const prefix = lang === 'ja' ? 'ja' : 'en';
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith(prefix));
  sel.innerHTML = '';
  if (voices.length === 0) {
    sel.innerHTML = '<option value="">（自動）</option>';
    selectedVoice = null;
    return;
  }
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    // 表示名を短く整形
    opt.textContent = v.name
      .replace('Google ', '')
      .replace(' Japanese', '')
      .replace(' English', '');
    sel.appendChild(opt);
  });
  selectedVoice = voices[0];
}
speechSynthesis.onvoiceschanged = () => loadVoices(currentLang);
loadVoices('ja');

function onVoiceChange() {
  const prefix = currentLang === 'ja' ? 'ja' : 'en';
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith(prefix));
  selectedVoice = voices[document.getElementById('voiceSelect').value] || null;
}

// =============================================
//  記事取得
// =============================================
async function fetchArticle() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url || !url.startsWith('http')) {
    setStatus('有効なURLを入力してください', 'error'); return;
  }

  setStatus('記事を取得中…');
  document.getElementById('fetchBtn').disabled = true;
  stopReading();

  let html = null;
  for (const proxyFn of PROXY_LIST) {
    try {
      const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(12000) });
      if (res.ok) { html = await res.text(); break; }
    } catch(e) { /* 次のプロキシへ */ }
  }

  document.getElementById('fetchBtn').disabled = false;

  if (!html) {
    setStatus('記事の取得に失敗しました。URLを確認するか、別の記事を試してください。', 'error');
    return;
  }

  const { title, text } = extractArticle(html, url);
  if (!text) {
    setStatus('本文の抽出に失敗しました。このサイトは対応していない可能性があります。', 'error');
    return;
  }

  showArticle(title, text, url);
}

// =============================================
//  本文抽出
// =============================================
function extractArticle(html, url) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  const title = (
    doc.querySelector('meta[property="og:title"]')?.content ||
    doc.querySelector('h1')?.textContent ||
    doc.title || ''
  ).trim();

  ['script','style','nav','header','footer','aside',
   '.ad','.ads','.advertisement','.sns','#menu',
   '[class*="share"]','[class*="related"]'].forEach(sel => {
    try { doc.querySelectorAll(sel).forEach(el => el.remove()); } catch(_){}
  });

  const candidates = [
    'article',
    '[class*="article-body"]','[class*="article_body"]',
    '[class*="entry-content"]','[class*="post-content"]',
    '[class*="content-body"]','[class*="story-body"]',
    '[class*="main-content"]','[id*="article"]',
    'main', '.content', '#content',
  ];

  let text = '';
  for (const sel of candidates) {
    const el = doc.querySelector(sel);
    if (el) {
      text = el.innerText || el.textContent || '';
      if (text.length > 100) break;
    }
  }

  if (text.length < 100) {
    text = [...doc.querySelectorAll('p')]
      .map(p => p.textContent.trim())
      .filter(t => t.length > 20)
      .join('\n');
  }

  text = text
    .replace(/https?:\/\/\S+/g, '')
    .replace(/[ \t]+/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();

  return { title, text };
}

// =============================================
//  記事表示
// =============================================
function showArticle(title, text, url) {
  // 言語自動判定
  currentLang = detectLang(text);
  loadVoices(currentLang);

  // 言語バッジ表示
  const badge = document.getElementById('langBadge');
  const isJa = currentLang === 'ja';
  badge.innerHTML = `
    <span style="
      display:inline-block;
      background:${isJa ? '#1a2a4a' : '#2a4a2a'};
      color:${isJa ? '#f5d020' : '#7ecb9a'};
      font-size:.7rem; letter-spacing:.08em;
      padding:3px 10px; border-radius:20px;
    ">${isJa ? '🇯🇵 日本語' : '🇺🇸 English'} — 自動検出</span>`;
  badge.style.display = 'block';

  const maxChars = parseInt(document.getElementById('maxChars').value) || 0;
  const limited = maxChars > 0 && text.length > maxChars;
  const displayText = limited ? text.slice(0, maxChars) : text;

  document.getElementById('articleTitle').textContent = title || '（タイトル不明）';
  document.getElementById('articleMeta').textContent =
    `${new URL(url).hostname} ／ ${text.length.toLocaleString()}文字${limited ? `（${maxChars}字で制限）` : ''}`;
  document.getElementById('articleText').textContent = displayText;

  sentences = splitToSentences(displayText, currentLang);
  currentIdx = 0;
  updateProgress();

  document.getElementById('articleCard').style.display = 'block';
  setStatus(`取得完了 — ${sentences.length}文`, 'ok');
}

// =============================================
//  文分割（日英切替）
// =============================================
function splitToSentences(text, lang) {
  let raw;
  if (lang === 'ja') {
    // 日本語：句点・感嘆符・疑問符・改行で分割
    raw = text.split(/(?<=[。！？\n])/);
  } else {
    // 英語：. ! ? の後にスペースまたは改行が続く箇所で分割
    raw = text.split(/(?<=[.!?])\s+/);
  }

  const minLen = lang === 'ja' ? 15 : 40;
  const result = [];
  let buf = '';
  for (const s of raw) {
    buf += (buf && lang === 'en' ? ' ' : '') + s;
    if (buf.trim().length >= minLen) {
      result.push(buf.trim());
      buf = '';
    }
  }
  if (buf.trim()) result.push(buf.trim());
  return result.filter(s => s.length > 0);
}

// =============================================
//  再生制御
// =============================================
function togglePlay() {
  if (isPlaying) {
    pauseReading();
  } else {
    if (currentIdx >= sentences.length) currentIdx = 0;
    isPlaying = true;
    updatePlayBtn();
    readNext();
  }
}

function pauseReading() {
  isPlaying = false;
  speechSynthesis.cancel();
  updatePlayBtn();
  setWave(false);
}

function stopReading() {
  isPlaying = false;
  currentIdx = 0;
  speechSynthesis.cancel();
  updatePlayBtn();
  updateProgress();
  setWave(false);
}

function readNext() {
  if (!isPlaying || currentIdx >= sentences.length) {
    if (currentIdx >= sentences.length) {
      isPlaying = false;
      updatePlayBtn();
      setWave(false);
      setStatus(currentLang === 'ja' ? '読み上げ完了 ✓' : 'Finished ✓', 'ok');
    }
    return;
  }

  const text = sentences[currentIdx];
  highlightSentence(currentIdx);
  updateProgress();

  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = currentLang === 'ja' ? 'ja-JP' : 'en-US';
  utterance.rate = rate;
  if (selectedVoice) utterance.voice = selectedVoice;

  utterance.onend = () => { currentIdx++; readNext(); };
  utterance.onerror = (e) => {
    if (e.error !== 'interrupted') { currentIdx++; readNext(); }
  };

  setWave(true);
  speechSynthesis.speak(utterance);
}

function skipSentences(delta) {
  const wasPlaying = isPlaying;
  speechSynthesis.cancel();
  isPlaying = false;
  currentIdx = Math.max(0, Math.min(sentences.length - 1, currentIdx + delta));
  updateProgress();
  if (wasPlaying) { isPlaying = true; updatePlayBtn(); setTimeout(readNext, 80); }
}

function onProgressInput(val) {
  const wasPlaying = isPlaying;
  speechSynthesis.cancel();
  isPlaying = false;
  currentIdx = Math.round((val / 100) * (sentences.length - 1));
  updateProgress();
  if (wasPlaying) { isPlaying = true; updatePlayBtn(); setTimeout(readNext, 80); }
}

// =============================================
//  UI更新ヘルパー
// =============================================
function updatePlayBtn() {
  const btn = document.getElementById('playPauseBtn');
  if (currentLang === 'ja') {
    btn.textContent = isPlaying ? '⏸ 一時停止' : '▶ 再生';
  } else {
    btn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
  }
}

function updateProgress() {
  const total = sentences.length;
  const pct = total > 0 ? (currentIdx / Math.max(total - 1, 1)) * 100 : 0;
  document.getElementById('progressBar').value = pct;
  document.getElementById('timeDisplay').textContent =
    `${currentIdx + 1} / ${total}`;
}

function highlightSentence(idx) {
  const box = document.getElementById('articleText');
  const full = sentences.join(currentLang === 'en' ? ' ' : '');
  let pos = 0;
  for (let i = 0; i < idx; i++) {
    pos += sentences[i].length + (currentLang === 'en' ? 1 : 0);
  }
  const before = full.slice(0, pos);
  const target = sentences[idx];
  const after  = full.slice(pos + target.length);
  box.innerHTML =
    escHtml(before) +
    `<mark class="highlight">${escHtml(target)}</mark>` +
    escHtml(after);
  const mark = box.querySelector('.highlight');
  if (mark) mark.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setWave(on) {
  document.getElementById('wave').classList.toggle('active', on);
}

function onRateChange(val) {
  rate = parseFloat(val);
  document.getElementById('rateVal').textContent = rate.toFixed(1);
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

window.addEventListener('beforeunload', () => speechSynthesis.cancel());
</script>
</body>
</html>
